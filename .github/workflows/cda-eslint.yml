name: ESLint Analysis

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  eslint:
    name: Run ESLint and upload SARIF
    runs-on: ubuntu-latest

    steps:
      # Download the repository.
      - name: Checkout repository
        uses: actions/checkout@v6

      # Install Node.js for the React project.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      # Install the exact packages from package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Create the output directory before running ESLint.
      - name: Create reports directory
        run: mkdir -p reports

      # Run ESLint and write its output in SARIF format.
      #
      # ESLint can return exit code 1 when it finds lint problems.
      # "|| true" allows the report to be uploaded afterward.
      - name: Generate ESLint SARIF report
        run: |
          npx eslint . \
            --format @microsoft/eslint-formatter-sarif \
            --output-file reports/eslint-results.sarif || true

      # Show whether the report was created.
      - name: Verify SARIF report
        run: |
          echo "Current directory:"
          pwd

          echo "Reports directory:"
          ls -la reports

          if [ ! -f reports/eslint-results.sarif ]; then
            echo "SARIF report was not generated."
            exit 1
          fi

          echo "SARIF report generated successfully."
          ls -lh reports/eslint-results.sarif

      # Upload the SARIF results to GitHub code scanning.
      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/eslint-results.sarif
          category: eslint
